<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <title>RunTracker Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            background: #10b981;
            padding: 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(16, 185, 129, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .gps-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 12px;
            opacity: 0.9;
        }

        .gps-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }

        .gps-dot.active {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        .main-screen {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a2a;
            transition: transform 0.2s;
        }

        .stat-card:active {
            transform: scale(0.98);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #10b981;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-unit {
            font-size: 14px;
            color: #666;
            margin-left: 2px;
        }

        .map-container {
            background: #1a1a1a;
            border-radius: 16px;
            height: 250px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            position: relative;
        }

        #mapCanvas {
            width: 100%;
            height: 100%;
        }

        .map-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }

        .map-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-start {
            background: #10b981;
            color: #fff;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-stop {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-pause {
            background: #f59e0b;
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .history-section {
            margin-top: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .run-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .run-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .run-info p {
            font-size: 13px;
            color: #888;
        }

        .run-stats {
            text-align: right;
        }

        .run-stats .distance {
            font-size: 20px;
            font-weight: 700;
            color: #10b981;
        }

        .run-stats .time {
            font-size: 13px;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1a1a1a;
            border: 1px solid #10b981;
            color: #10b981;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 200;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .pace-chart {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }

        .pace-bar {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .pace-bar-label {
            width: 40px;
            font-size: 12px;
            color: #888;
        }

        .pace-bar-fill {
            flex: 1;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 8px;
        }

        .pace-bar-fill-inner {
            height: 100%;
            background: #10b981;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .pace-bar-value {
            width: 50px;
            font-size: 12px;
            color: #10b981;
            text-align: right;
        }

        .hidden {
            display: none !important;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .live-indicator .pulse {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .install-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
            display: none;
            z-index: 100;
        }

        .install-btn.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏃 RunTracker Pro</h1>
        <div class="gps-status">
            <div class="gps-dot" id="gpsDot"></div>
            <span id="gpsText">GPS: Searching...</span>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <div class="main-screen">
        <div class="live-indicator hidden" id="liveIndicator">
            <div class="pulse"></div>
            LIVE TRACKING
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="distance">0.00<span class="stat-unit">km</span></div>
                <div class="stat-label">Distance</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="duration">00:00<span class="stat-unit"></span></div>
                <div class="stat-label">Duration</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pace">--:--<span class="stat-unit">/km</span></div>
                <div class="stat-label">Pace</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="calories">0<span class="stat-unit">kcal</span></div>
                <div class="stat-label">Calories</div>
            </div>
        </div>

        <div class="map-container">
            <canvas id="mapCanvas"></canvas>
            <div class="map-placeholder" id="mapPlaceholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <p>Map will appear here</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startRun()">Start Run</button>
            <button class="btn btn-pause hidden" id="pauseBtn" onclick="pauseRun()">Pause</button>
            <button class="btn btn-stop hidden" id="stopBtn" onclick="stopRun()">Stop</button>
        </div>

        <div class="history-section">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Run History
            </h2>
            <div id="historyList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                    <p>No runs yet. Start your first run!</p>
                </div>
            </div>
        </div>
    </div>

    <button class="install-btn" id="installBtn" onclick="installApp()">+</button>

    <script>
        // App State
        let isRunning = false;
        let isPaused = false;
        let watchId = null;
        let startTime = null;
        let pausedTime = 0;
        let positions = [];
        let totalDistance = 0;
        let timerInterval = null;
        let currentPace = 0;
        let runHistory = JSON.parse(localStorage.getItem('runHistory') || '[]');
        let deferredPrompt = null;

        // DOM Elements
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const distanceEl = document.getElementById('distance');
        const durationEl = document.getElementById('duration');
        const paceEl = document.getElementById('pace');
        const caloriesEl = document.getElementById('calories');
        const gpsDot = document.getElementById('gpsDot');
        const gpsText = document.getElementById('gpsText');
        const liveIndicator = document.getElementById('liveIndicator');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapPlaceholder = document.getElementById('mapPlaceholder');
        const notification = document.getElementById('notification');
        const installBtn = document.getElementById('installBtn');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkGPS();
            renderHistory();
            setupCanvas();

            // Check for install prompt
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.classList.add('show');
            });
        });

        // Setup Canvas
        function setupCanvas() {
            const rect = mapCanvas.parentElement.getBoundingClientRect();
            mapCanvas.width = rect.width * window.devicePixelRatio;
            mapCanvas.height = rect.height * window.devicePixelRatio;
            const ctx = mapCanvas.getContext('2d');
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        // Check GPS Status
        function checkGPS() {
            if (!navigator.geolocation) {
                gpsText.textContent = 'GPS: Not Supported';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                () => {
                    gpsDot.classList.add('active');
                    gpsText.textContent = 'GPS: Ready';
                },
                () => {
                    gpsDot.classList.remove('active');
                    gpsText.textContent = 'GPS: Permission Needed';
                },
                { enableHighAccuracy: true }
            );
        }

        // Start Run
        function startRun() {
            if (!navigator.geolocation) {
                showNotification('GPS not supported on this device');
                return;
            }

            isRunning = true;
            isPaused = false;
            startTime = Date.now() - pausedTime;
            positions = [];
            totalDistance = 0;

            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            stopBtn.classList.remove('hidden');
            liveIndicator.classList.remove('hidden');
            mapPlaceholder.classList.add('hidden');

            // Start GPS tracking
            watchId = navigator.geolocation.watchPosition(
                handlePosition,
                handleError,
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );

            // Start timer
            timerInterval = setInterval(updateTimer, 100);

            showNotification('Run started! GPS tracking active');
        }

        // Pause Run
        function pauseRun() {
            isPaused = true;
            pausedTime = Date.now() - startTime;
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);

            pauseBtn.textContent = 'Resume';
            pauseBtn.onclick = resumeRun;
            liveIndicator.classList.add('hidden');

            showNotification('Run paused');
        }

        // Resume Run
        function resumeRun() {
            isPaused = false;
            startTime = Date.now() - pausedTime;

            watchId = navigator.geolocation.watchPosition(
                handlePosition,
                handleError,
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );

            timerInterval = setInterval(updateTimer, 100);

            pauseBtn.textContent = 'Pause';
            pauseBtn.onclick = pauseRun;
            liveIndicator.classList.remove('hidden');

            showNotification('Run resumed');
        }

        // Stop Run
        function stopRun() {
            isRunning = false;
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);

            const duration = Date.now() - startTime;

            // Save run
            const run = {
                id: Date.now(),
                date: new Date().toISOString(),
                distance: totalDistance,
                duration: duration,
                pace: currentPace,
                calories: Math.round(totalDistance * 60),
                positions: positions
            };

            runHistory.unshift(run);
            localStorage.setItem('runHistory', JSON.stringify(runHistory));

            // Reset UI
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            stopBtn.classList.add('hidden');
            liveIndicator.classList.add('hidden');
            pauseBtn.textContent = 'Pause';
            pauseBtn.onclick = pauseRun;

            // Reset stats
            distanceEl.innerHTML = '0.00<span class="stat-unit">km</span>';
            durationEl.textContent = '00:00';
            paceEl.innerHTML = '--:--<span class="stat-unit">/km</span>';
            caloriesEl.innerHTML = '0<span class="stat-unit">kcal</span>';

            pausedTime = 0;

            renderHistory();
            showNotification(`Run saved! ${totalDistance.toFixed(2)} km in ${formatTime(duration)}`);
        }

        // Handle Position Update
        function handlePosition(position) {
            const pos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                accuracy: position.coords.accuracy,
                timestamp: position.timestamp
            };

            positions.push(pos);

            if (positions.length > 1) {
                const lastPos = positions[positions.length - 2];
                const dist = calculateDistance(lastPos.lat, lastPos.lng, pos.lat, pos.lng);
                totalDistance += dist;
            }

            updateStats();
            drawRoute();
        }

        // Handle GPS Error
        function handleError(error) {
            let message = 'GPS Error';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = 'Please allow GPS permission';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = 'GPS signal weak';
                    break;
                case error.TIMEOUT:
                    message = 'GPS timeout';
                    break;
            }
            showNotification(message);
        }

        // Calculate Distance (Haversine Formula)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Update Timer
        function updateTimer() {
            const duration = Date.now() - startTime;
            durationEl.textContent = formatTime(duration);
            updateStats();
        }

        // Update Stats
        function updateStats() {
            distanceEl.innerHTML = totalDistance.toFixed(2) + '<span class="stat-unit">km</span>';

            if (totalDistance > 0) {
                const duration = Date.now() - startTime;
                const paceMs = duration / totalDistance; // ms per km
                currentPace = paceMs;
                paceEl.innerHTML = formatPace(paceMs) + '<span class="stat-unit">/km</span>';
            }

            const calories = Math.round(totalDistance * 60); // Approx 60 kcal per km
            caloriesEl.innerHTML = calories + '<span class="stat-unit">kcal</span>';
        }

        // Format Time
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Format Pace
        function formatPace(msPerKm) {
            const totalSeconds = Math.floor(msPerKm / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Draw Route on Canvas
        function drawRoute() {
            if (positions.length < 2) return;

            const ctx = mapCanvas.getContext('2d');
            const width = mapCanvas.width / window.devicePixelRatio;
            const height = mapCanvas.height / window.devicePixelRatio;

            // Find bounds
            let minLat = Infinity, maxLat = -Infinity;
            let minLng = Infinity, maxLng = -Infinity;

            positions.forEach(pos => {
                minLat = Math.min(minLat, pos.lat);
                maxLat = Math.max(maxLat, pos.lat);
                minLng = Math.min(minLng, pos.lng);
                maxLng = Math.max(maxLng, pos.lng);
            });

            // Add padding
            const padding = 0.0005;
            minLat -= padding;
            maxLat += padding;
            minLng -= padding;
            maxLng += padding;

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Draw route
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();

            positions.forEach((pos, i) => {
                const x = ((pos.lng - minLng) / (maxLng - minLng)) * width;
                const y = height - ((pos.lat - minLat) / (maxLat - minLat)) * height;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.stroke();

            // Draw start point
            const startX = ((positions[0].lng - minLng) / (maxLng - minLng)) * width;
            const startY = height - ((positions[0].lat - minLat) / (maxLat - minLat)) * height;
            ctx.fillStyle = '#22c55e';
            ctx.beginPath();
            ctx.arc(startX, startY, 6, 0, Math.PI * 2);
            ctx.fill();

            // Draw current position
            const lastPos = positions[positions.length - 1];
            const lastX = ((lastPos.lng - minLng) / (maxLng - minLng)) * width;
            const lastY = height - ((lastPos.lat - minLat) / (maxLat - minLat)) * height;
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(lastX, lastY, 6, 0, Math.PI * 2);
            ctx.fill();

            // Draw pulse effect
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(lastX, lastY, 12 + Math.sin(Date.now() / 200) * 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Render History
        function renderHistory() {
            const historyList = document.getElementById('historyList');

            if (runHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <p>No runs yet. Start your first run!</p>
                    </div>
                `;
                return;
            }

            historyList.innerHTML = runHistory.map(run => {
                const date = new Date(run.date);
                const dateStr = date.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="run-card">
                        <div class="run-info">
                            <h3>Run #${runHistory.indexOf(run) + 1}</h3>
                            <p>${dateStr}</p>
                        </div>
                        <div class="run-stats">
                            <div class="distance">${run.distance.toFixed(2)} km</div>
                            <div class="time">${formatTime(run.duration)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Show Notification
        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Install App
        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.remove('show');
                }
                deferredPrompt = null;
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            setupCanvas();
            if (positions.length > 0) {
                drawRoute();
            }
        });
    </script>
</body>
</html>
