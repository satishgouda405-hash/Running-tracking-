<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <title>RunTracker Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #059669, #10b981);
            padding: 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(16,185,129,0.4);
        }
        .header h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
        .gps-status { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; font-size: 12px; opacity: 0.95; }
        .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
        .gps-dot.active { background: #fff; box-shadow: 0 0 8px #fff; }
        .gps-dot.searching { background: #f59e0b; animation: pulse 1s infinite; }

        /* MAIN */
        .main-screen { padding: 16px; max-width: 500px; margin: 0 auto; }

        /* WEIGHT SETUP BANNER */
        .weight-banner {
            background: #1a1a1a;
            border: 1px solid #f59e0b;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .weight-banner p { font-size: 13px; color: #f59e0b; flex: 1; }
        .weight-banner input {
            width: 70px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #fff;
            padding: 6px 8px;
            font-size: 14px;
            text-align: center;
        }
        .weight-banner button {
            background: #f59e0b;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .stat-value { font-size: 32px; font-weight: 800; color: #10b981; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-unit { font-size: 13px; color: #555; margin-left: 2px; }

        /* STEP COUNTER - full width card */
        .steps-card {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .steps-left { display: flex; align-items: center; gap: 12px; }
        .steps-icon { font-size: 28px; }
        .steps-count { font-size: 28px; font-weight: 800; color: #10b981; }
        .steps-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .steps-right { text-align: right; }
        .steps-cadence { font-size: 18px; font-weight: 700; color: #888; }
        .steps-cadence-label { font-size: 11px; color: #555; }

        /* MAP */
        .map-container {
            background: #111;
            border-radius: 14px;
            height: 220px;
            margin-bottom: 16px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            position: relative;
        }
        #mapCanvas { width: 100%; height: 100%; display: block; }
        .map-placeholder {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: #555;
        }
        .map-placeholder svg { width: 40px; height: 40px; margin-bottom: 8px; opacity: 0.4; }
        .map-placeholder p { font-size: 13px; }
        .map-legend {
            position: absolute; bottom: 8px; left: 8px;
            display: flex; gap: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* CONTROLS */
        .controls { display: flex; gap: 10px; margin-bottom: 16px; }
        .btn {
            flex: 1; padding: 18px; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 800; cursor: pointer;
            transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: #10b981; color: #fff; box-shadow: 0 4px 20px rgba(16,185,129,0.4); }
        .btn-stop { background: #ef4444; color: #fff; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
        .btn-pause { background: #f59e0b; color: #fff; }

        /* LIVE INDICATOR */
        .live-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(239,68,68,0.15); color: #ef4444;
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700; margin-bottom: 12px;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .live-indicator .pulse-dot {
            width: 7px; height: 7px; background: #ef4444;
            border-radius: 50%; animation: pulse 1.2s infinite;
        }

        /* HISTORY */
        .history-section { margin-top: 24px; }
        .section-title {
            font-size: 16px; font-weight: 700; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; color: #ccc;
        }
        .run-card {
            background: #1a1a1a; border-radius: 14px; padding: 14px 16px;
            margin-bottom: 10px; border: 1px solid #2a2a2a;
        }
        .run-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .run-info h3 { font-size: 15px; margin-bottom: 3px; }
        .run-info p { font-size: 12px; color: #666; }
        .run-stats-right { text-align: right; }
        .run-stats-right .distance { font-size: 20px; font-weight: 800; color: #10b981; }
        .run-stats-right .time { font-size: 12px; color: #666; }
        .run-meta { display: flex; gap: 12px; padding-top: 10px; border-top: 1px solid #2a2a2a; }
        .run-meta-item { font-size: 12px; color: #777; }
        .run-meta-item span { color: #aaa; font-weight: 600; }
        .run-mini-map {
            width: 100%; height: 70px; border-radius: 8px;
            background: #111; margin-top: 10px; display: block;
        }

        /* NOTIFICATION */
        .notification {
            position: fixed; top: 75px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a1a1a; border: 1px solid #10b981;
            color: #10b981; padding: 10px 20px;
            border-radius: 10px; font-weight: 600; font-size: 14px;
            z-index: 200; transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); white-space: nowrap;
            max-width: 90vw; text-align: center;
        }
        .notification.show { transform: translateX(-50%) translateY(0); }

        /* INSTALL BTN */
        .install-banner {
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            background: #1a1a1a; border: 1px solid #10b981;
            border-radius: 14px; padding: 12px 16px;
            display: none; align-items: center; justify-content: space-between;
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .install-banner.show { display: flex; }
        .install-banner p { font-size: 13px; color: #ccc; }
        .install-banner button {
            background: #10b981; color: #fff; border: none;
            border-radius: 8px; padding: 8px 14px;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .install-banner .dismiss {
            background: transparent; color: #666; padding: 8px;
        }

        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 30px 20px; color: #555; }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }

        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏃 RunTracker Pro</h1>
        <div class="gps-status">
            <div class="gps-dot" id="gpsDot"></div>
            <span id="gpsText">GPS: Searching...</span>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <div class="main-screen">

        <!-- Weight banner for accurate calories -->
        <div class="weight-banner" id="weightBanner">
            <p>⚡ Set your weight for accurate calories</p>
            <input type="number" id="weightInput" placeholder="kg" min="30" max="200">
            <button onclick="saveWeight()">Save</button>
        </div>

        <div class="live-indicator hidden" id="liveIndicator">
            <div class="pulse-dot"></div>
            LIVE TRACKING
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="distance">0.00<span class="stat-unit">km</span></div>
                <div class="stat-label">Distance</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="duration">00:00</div>
                <div class="stat-label">Duration</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pace">--:--<span class="stat-unit">/km</span></div>
                <div class="stat-label">Pace</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="calories">0<span class="stat-unit">kcal</span></div>
                <div class="stat-label">Calories</div>
            </div>
        </div>

        <!-- Step counter -->
        <div class="steps-card">
            <div class="steps-left">
                <div class="steps-icon">👟</div>
                <div>
                    <div class="steps-count" id="stepCount">0</div>
                    <div class="steps-label">Steps</div>
                </div>
            </div>
            <div class="steps-right">
                <div class="steps-cadence" id="cadence">--</div>
                <div class="steps-cadence-label">steps/min</div>
            </div>
        </div>

        <div class="map-container">
            <canvas id="mapCanvas"></canvas>
            <div class="map-placeholder" id="mapPlaceholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <p>Route will appear here</p>
            </div>
            <div class="map-legend hidden" id="mapLegend">
                <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Start</div>
                <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Current</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startRun()">Start Run</button>
            <button class="btn btn-pause hidden" id="pauseBtn" onclick="pauseRun()">Pause</button>
            <button class="btn btn-stop hidden" id="stopBtn" onclick="stopRun()">Stop</button>
        </div>

        <div class="history-section">
            <h2 class="section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Run History
            </h2>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Install banner -->
    <div class="install-banner" id="installBanner">
        <p>📲 Add RunTracker to Home Screen</p>
        <button onclick="installApp()">Install</button>
        <button class="dismiss" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────────────────
        let isRunning = false;
        let isPaused = false;
        let watchId = null;
        let startTime = null;
        let pausedTime = 0;
        let movingTime = 0;          // FIX: only count time actually moving
        let movingStart = null;
        let positions = [];
        let totalDistance = 0;
        let timerInterval = null;
        let animFrame = null;
        let currentPace = 0;
        let stepCount = 0;
        let stepInterval = null;
        let cadenceReadings = [];
        let lastStepTime = null;
        let userWeight = parseFloat(localStorage.getItem('userWeight')) || 70; // kg default
        let runHistory = JSON.parse(localStorage.getItem('runHistory') || '[]');
        let deferredPrompt = null;

        // ── DOM ────────────────────────────────────────────────────────────
        const startBtn      = document.getElementById('startBtn');
        const pauseBtn      = document.getElementById('pauseBtn');
        const stopBtn       = document.getElementById('stopBtn');
        const distanceEl    = document.getElementById('distance');
        const durationEl    = document.getElementById('duration');
        const paceEl        = document.getElementById('pace');
        const caloriesEl    = document.getElementById('calories');
        const stepCountEl   = document.getElementById('stepCount');
        const cadenceEl     = document.getElementById('cadence');
        const gpsDot        = document.getElementById('gpsDot');
        const gpsText       = document.getElementById('gpsText');
        const liveIndicator = document.getElementById('liveIndicator');
        const mapCanvas     = document.getElementById('mapCanvas');
        const mapPlaceholder= document.getElementById('mapPlaceholder');
        const mapLegend     = document.getElementById('mapLegend');
        const notification  = document.getElementById('notification');
        const weightBanner  = document.getElementById('weightBanner');
        const weightInput   = document.getElementById('weightInput');

        // ── Init ───────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            checkGPS();
            renderHistory();
            setupCanvas();

            // Show/hide weight banner
            if (localStorage.getItem('userWeight')) {
                weightBanner.style.display = 'none';
            }
            weightInput.value = userWeight !== 70 ? userWeight : '';

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installBanner').classList.add('show');
            });
        });

        // ── Weight ─────────────────────────────────────────────────────────
        function saveWeight() {
            const w = parseFloat(weightInput.value);
            if (w >= 30 && w <= 200) {
                userWeight = w;
                localStorage.setItem('userWeight', w);
                weightBanner.style.display = 'none';
                showNotification('Weight saved! Calories will be accurate 💪');
            } else {
                showNotification('Enter a valid weight (30–200 kg)');
            }
        }

        // ── Canvas ─────────────────────────────────────────────────────────
        function setupCanvas() {
            const rect = mapCanvas.parentElement.getBoundingClientRect();
            mapCanvas.width  = rect.width  * window.devicePixelRatio;
            mapCanvas.height = rect.height * window.devicePixelRatio;
            const ctx = mapCanvas.getContext('2d');
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        // ── GPS ────────────────────────────────────────────────────────────
        function checkGPS() {
            if (!navigator.geolocation) {
                gpsText.textContent = 'GPS: Not Supported';
                return;
            }
            gpsDot.classList.add('searching');
            gpsText.textContent = 'GPS: Searching...';
            navigator.geolocation.getCurrentPosition(
                () => {
                    gpsDot.classList.remove('searching');
                    gpsDot.classList.add('active');
                    gpsText.textContent = 'GPS: Ready';
                },
                () => {
                    gpsDot.classList.remove('searching');
                    gpsText.textContent = 'GPS: Permission Needed';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // ── Start Run ──────────────────────────────────────────────────────
        function startRun() {
            if (!navigator.geolocation) {
                showNotification('GPS not supported on this device');
                return;
            }

            isRunning = true;
            isPaused  = false;
            startTime = Date.now();
            pausedTime = 0;
            movingTime = 0;
            movingStart = null;
            positions = [];
            totalDistance = 0;
            stepCount = 0;
            cadenceReadings = [];
            lastStepTime = null;
            currentPace = 0;

            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            stopBtn.classList.remove('hidden');
            liveIndicator.classList.remove('hidden');
            mapPlaceholder.classList.add('hidden');
            mapLegend.classList.remove('hidden');

            // GPS
            watchId = navigator.geolocation.watchPosition(
                handlePosition, handleError,
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );

            // Step counter via accelerometer
            startStepCounter();

            // Timer
            timerInterval = setInterval(updateTimer, 500);

            showNotification('Run started! 🏃 GPS active');
        }

        // ── Pause ──────────────────────────────────────────────────────────
        function pauseRun() {
            isPaused = true;
            // Save moving time
            if (movingStart) {
                movingTime += Date.now() - movingStart;
                movingStart = null;
            }
            pausedTime = Date.now();
            clearInterval(timerInterval);
            stopStepCounter();
            navigator.geolocation.clearWatch(watchId);

            pauseBtn.textContent = 'Resume';
            pauseBtn.onclick = resumeRun;
            liveIndicator.classList.add('hidden');
            showNotification('Run paused ⏸');
        }

        // ── Resume ─────────────────────────────────────────────────────────
        function resumeRun() {
            isPaused = false;
            // Adjust startTime so duration stays correct
            startTime += (Date.now() - pausedTime);

            watchId = navigator.geolocation.watchPosition(
                handlePosition, handleError,
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );
            startStepCounter();
            timerInterval = setInterval(updateTimer, 500);

            pauseBtn.textContent = 'Pause';
            pauseBtn.onclick = pauseRun;
            liveIndicator.classList.remove('hidden');
            showNotification('Run resumed ▶');
        }

        // ── Stop ───────────────────────────────────────────────────────────
        function stopRun() {
            isRunning = false;
            clearInterval(timerInterval);
            stopStepCounter();
            navigator.geolocation.clearWatch(watchId);
            if (animFrame) cancelAnimationFrame(animFrame);

            if (movingStart) {
                movingTime += Date.now() - movingStart;
                movingStart = null;
            }

            const totalDuration = Date.now() - startTime;

            const run = {
                id: Date.now(),
                date: new Date().toISOString(),
                distance: totalDistance,
                duration: totalDuration,
                movingTime: movingTime,
                pace: currentPace,
                calories: calcCalories(totalDistance, totalDuration),
                steps: stepCount,
                positions: positions
            };

            runHistory.unshift(run);
            localStorage.setItem('runHistory', JSON.stringify(runHistory));

            // Reset UI
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            stopBtn.classList.add('hidden');
            liveIndicator.classList.add('hidden');
            mapLegend.classList.add('hidden');
            pauseBtn.textContent = 'Pause';
            pauseBtn.onclick = pauseRun;

            distanceEl.innerHTML = '0.00<span class="stat-unit">km</span>';
            durationEl.textContent = '00:00';
            paceEl.innerHTML = '--:--<span class="stat-unit">/km</span>';
            caloriesEl.innerHTML = '0<span class="stat-unit">kcal</span>';
            stepCountEl.textContent = '0';
            cadenceEl.textContent = '--';

            // Clear canvas
            const ctx = mapCanvas.getContext('2d');
            ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            mapPlaceholder.classList.remove('hidden');

            pausedTime = 0;
            renderHistory();
            showNotification(`Saved! ${totalDistance.toFixed(2)} km · ${stepCount} steps 🎉`);
        }

        // ── GPS Position ───────────────────────────────────────────────────
        function handlePosition(position) {
            const pos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                accuracy: position.coords.accuracy,
                timestamp: position.timestamp
            };

            // Skip poor accuracy readings
            if (pos.accuracy > 35) return;

            if (positions.length > 0) {
                const lastPos = positions[positions.length - 1];
                const dist = calcDistance(lastPos.lat, lastPos.lng, pos.lat, pos.lng);

                // Only count if moved more than 8m (filters GPS drift)
                if (dist < 0.008) return;

                // Moving — start tracking moving time
                if (!movingStart) movingStart = Date.now();
                totalDistance += dist;

            } else {
                // First point
                movingStart = Date.now();
            }

            positions.push(pos);
            updateStats();
            drawRoute();
        }

        function handleError(error) {
            const msgs = {
                1: 'Allow GPS permission in browser settings',
                2: 'GPS signal weak — go outside',
                3: 'GPS timeout — retrying'
            };
            showNotification(msgs[error.code] || 'GPS error');
        }

        // ── Step Counter ───────────────────────────────────────────────────
        function startStepCounter() {
            if (!window.DeviceMotionEvent) return;

            let lastMag = 0;
            let stepThreshold = 12;
            let lastStepTs = 0;
            let buffer = [];

            function onMotion(e) {
                const a = e.accelerationIncludingGravity;
                if (!a) return;
                const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
                buffer.push(mag);
                if (buffer.length > 5) buffer.shift();
                const avg = buffer.reduce((s,v) => s+v, 0) / buffer.length;

                // Detect step: magnitude crosses threshold upward
                if (lastMag < stepThreshold && avg >= stepThreshold) {
                    const now = Date.now();
                    if (now - lastStepTs > 250) { // min 250ms between steps
                        stepCount++;
                        stepCountEl.textContent = stepCount;

                        // Cadence: steps per minute
                        if (lastStepTs) {
                            const interval = now - lastStepTs;
                            cadenceReadings.push(60000 / interval);
                            if (cadenceReadings.length > 8) cadenceReadings.shift();
                            const avgCadence = Math.round(cadenceReadings.reduce((s,v) => s+v, 0) / cadenceReadings.length);
                            cadenceEl.textContent = avgCadence;
                        }
                        lastStepTs = now;
                    }
                }
                lastMag = avg;
            }

            window.addEventListener('devicemotion', onMotion);
            window._motionHandler = onMotion;
        }

        function stopStepCounter() {
            if (window._motionHandler) {
                window.removeEventListener('devicemotion', window._motionHandler);
                window._motionHandler = null;
            }
        }

        // ── Calculations ───────────────────────────────────────────────────
        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // FIX: MET-based calorie formula (much more accurate)
        function calcCalories(distKm, durationMs) {
            if (distKm === 0) return 0;
            const hours = durationMs / 3600000;
            const speedKmh = distKm / hours;
            // MET value based on speed
            let met = 6; // walking default
            if (speedKmh >= 12) met = 11;
            else if (speedKmh >= 9)  met = 9.8;
            else if (speedKmh >= 7)  met = 8;
            else if (speedKmh >= 5)  met = 6.5;
            // Calories = MET × weight(kg) × time(hours)
            return Math.round(met * userWeight * hours);
        }

        // ── Timer & Stats ──────────────────────────────────────────────────
        function updateTimer() {
            if (!startTime) return;
            const elapsed = Date.now() - startTime;
            durationEl.textContent = formatTime(elapsed);
            updateStats();
        }

        function updateStats() {
            distanceEl.innerHTML = totalDistance.toFixed(2) + '<span class="stat-unit">km</span>';

            // FIX: Pace uses moving time only, not total elapsed time
            if (totalDistance > 0.05 && movingStart) {
                const currentMoving = movingTime + (Date.now() - movingStart);
                const paceMs = currentMoving / totalDistance;
                currentPace = paceMs;
                // Only show pace if it looks realistic (2min–20min per km)
                if (paceMs > 120000 && paceMs < 1200000) {
                    paceEl.innerHTML = formatPace(paceMs) + '<span class="stat-unit">/km</span>';
                }
            }

            const elapsed = startTime ? Date.now() - startTime : 0;
            caloriesEl.innerHTML = calcCalories(totalDistance, elapsed) + '<span class="stat-unit">kcal</span>';
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }

        function formatPace(msPerKm) {
            const s = Math.floor(msPerKm / 1000);
            return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
        }

        // ── Draw Route ─────────────────────────────────────────────────────
        function drawRoute(miniCtx, miniPositions, miniW, miniH) {
            const pts  = miniPositions || positions;
            const ctx  = miniCtx || mapCanvas.getContext('2d');
            const w    = miniW || mapCanvas.width / window.devicePixelRatio;
            const h    = miniH || mapCanvas.height / window.devicePixelRatio;

            if (pts.length < 2) return;

            let minLat = Infinity, maxLat = -Infinity;
            let minLng = Infinity, maxLng = -Infinity;
            pts.forEach(p => {
                minLat = Math.min(minLat, p.lat); maxLat = Math.max(maxLat, p.lat);
                minLng = Math.min(minLng, p.lng); maxLng = Math.max(maxLng, p.lng);
            });

            const pad = 0.0003;
            minLat -= pad; maxLat += pad;
            minLng -= pad; maxLng += pad;

            const latRange = maxLat - minLat || 0.001;
            const lngRange = maxLng - minLng || 0.001;

            function toX(lng) { return ((lng - minLng) / lngRange) * w; }
            function toY(lat) { return h - ((lat - minLat) / latRange) * h; }

            ctx.clearRect(0, 0, w, h);

            // Background for mini map
            if (miniCtx) {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, w, h);
            }

            // Shadow glow on route
            ctx.shadowColor = 'rgba(16,185,129,0.5)';
            ctx.shadowBlur = 6;

            // Draw route
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = miniCtx ? 2 : 3.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            pts.forEach((p, i) => {
                i === 0 ? ctx.moveTo(toX(p.lng), toY(p.lat)) : ctx.lineTo(toX(p.lng), toY(p.lat));
            });
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Start dot (green)
            ctx.fillStyle = '#22c55e';
            ctx.beginPath();
            ctx.arc(toX(pts[0].lng), toY(pts[0].lat), miniCtx ? 3 : 6, 0, Math.PI*2);
            ctx.fill();

            // End dot (red) with pulse
            const last = pts[pts.length - 1];
            const lx = toX(last.lng), ly = toY(last.lat);
            if (!miniCtx) {
                ctx.strokeStyle = 'rgba(239,68,68,0.25)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(lx, ly, 11 + Math.sin(Date.now()/300)*3, 0, Math.PI*2);
                ctx.stroke();
            }
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(lx, ly, miniCtx ? 3 : 6, 0, Math.PI*2);
            ctx.fill();

            // Animate pulse on live map
            if (!miniCtx && isRunning) {
                animFrame = requestAnimationFrame(() => drawRoute());
            }
        }

        // ── Render History ─────────────────────────────────────────────────
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (runHistory.length === 0) {
                list.innerHTML = `<div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                    <p>No runs yet. Start your first run!</p>
                </div>`;
                return;
            }

            list.innerHTML = runHistory.map((run, idx) => {
                const dateStr = new Date(run.date).toLocaleString('en-IN', {
                    month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const pace = run.movingTime && run.distance > 0
                    ? formatPace(run.movingTime / run.distance)
                    : (run.pace ? formatPace(run.pace) : '--:--');
                const steps = run.steps || '--';
                const cals  = run.calories || calcCalories(run.distance, run.duration);

                return `
                <div class="run-card">
                    <div class="run-card-top">
                        <div class="run-info">
                            <h3>Run #${runHistory.length - idx}</h3>
                            <p>${dateStr}</p>
                        </div>
                        <div class="run-stats-right">
                            <div class="distance">${run.distance.toFixed(2)} km</div>
                            <div class="time">${formatTime(run.duration)}</div>
                        </div>
                    </div>
                    <div class="run-meta">
                        <div class="run-meta-item">⚡ <span>${pace}/km</span></div>
                        <div class="run-meta-item">🔥 <span>${cals} kcal</span></div>
                        <div class="run-meta-item">👟 <span>${steps} steps</span></div>
                    </div>
                    ${run.positions && run.positions.length > 1
                        ? `<canvas class="run-mini-map" id="miniMap${run.id}" width="300" height="70"></canvas>`
                        : ''}
                </div>`;
            }).join('');

            // Draw mini maps
            runHistory.forEach(run => {
                if (!run.positions || run.positions.length < 2) return;
                const canvas = document.getElementById(`miniMap${run.id}`);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                drawRoute(ctx, run.positions, canvas.width, canvas.height);
            });
        }

        // ── Notification ───────────────────────────────────────────────────
        function showNotification(msg) {
            notification.textContent = msg;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        // ── Install ────────────────────────────────────────────────────────
        async function installApp() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installBanner').classList.remove('show');
            }
            deferredPrompt = null;
        }

        window.addEventListener('resize', () => {
            setupCanvas();
            if (positions.length > 1) drawRoute();
        });

        // ── Service Worker ─────────────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW ready:', reg.scope))
                .catch(err => console.warn('SW failed:', err));
        }
    </script>
</body>
</html>
